<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">CodeDNA DNA workflow</title>
  <desc id="desc">CodeDNA guides Codex through a double-strand workflow from requirement capture to review and memory evolution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="72" y="84" font-size="40" font-weight="800" fill="#0f172a">CodeDNA 主流程</text>
    <text x="72" y="124" font-size="20" fill="#475569">先让需求和技术分析配对，再让 Codex 执行、审查、沉淀。</text>

    <g filter="url(#shadow)">
      <rect x="90" y="190" width="410" height="130" rx="26" fill="#ffffff" stroke="#dbeafe"/>
      <text x="130" y="245" font-size="28" font-weight="800" fill="#0f172a">用户需求链</text>
      <text x="130" y="282" font-size="18" fill="#64748b">目标、限制、偏好、验收标准</text>
      <path d="M514 255 C570 200 640 200 696 255" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
      <path d="M514 255 C570 310 640 310 696 255" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
      <text x="550" y="250" font-size="22" font-weight="800" fill="#0f172a">配对审查</text>
      <text x="548" y="283" font-size="16" fill="#64748b">评分 + 风险 + 缺失信息</text>
      <rect x="720" y="190" width="470" height="130" rx="26" fill="#ffffff" stroke="#d1fae5"/>
      <text x="760" y="245" font-size="28" font-weight="800" fill="#0f172a">反向解析链</text>
      <text x="760" y="282" font-size="18" fill="#64748b">任务、模块、影响文件、测试计划</text>
    </g>

    <line x1="640" y1="344" x2="640" y2="410" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="370" y="420" width="540" height="78" rx="22" fill="#ffffff" stroke="#bae6fd"/>
      <text x="425" y="470" font-size="26" font-weight="800" fill="#0f172a">Codex 任务包</text>
      <text x="632" y="470" font-size="18" fill="#64748b">给 Codex 的可执行任务说明</text>
    </g>
    <line x1="640" y1="505" x2="640" y2="548" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="170" y="560" width="270" height="82" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="225" y="611" font-size="24" font-weight="800" fill="#0f172a">代码执行</text>
      <rect x="505" y="560" width="270" height="82" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="560" y="611" font-size="24" font-weight="800" fill="#0f172a">反向审查</text>
      <rect x="840" y="560" width="270" height="82" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="895" y="611" font-size="24" font-weight="800" fill="#0f172a">记忆进化</text>
    </g>
    <line x1="440" y1="601" x2="500" y2="601" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="775" y1="601" x2="835" y2="601" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
</svg>
