<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">CodeDNA usage flow</title>
  <desc id="desc">A high-level diagram showing CodeDNA guiding a coding task from request to plan, execution, and review.</desc>
  <rect width="1200" height="520" rx="28" fill="#f8fafc"/>
  <text x="70" y="78" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">CodeDNA 使用流程</text>
  <text x="70" y="116" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#64748b">适合复杂、范围不清或需要验收的 Codex 编码任务</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="70" y="190" width="190" height="100" rx="20" fill="#ffffff" stroke="#dbe3ee"/>
    <text x="112" y="232" font-size="22" font-weight="700" fill="#0f172a">提出需求</text>
    <text x="104" y="262" font-size="16" fill="#64748b">说明目标和限制</text>
    <line x1="260" y1="240" x2="326" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="340" y="190" width="190" height="100" rx="20" fill="#ffffff" stroke="#dbe3ee"/>
    <text x="382" y="232" font-size="22" font-weight="700" fill="#0f172a">先分析</text>
    <text x="374" y="262" font-size="16" fill="#64748b">确认范围和风险</text>
    <line x1="530" y1="240" x2="596" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="610" y="190" width="190" height="100" rx="20" fill="#ffffff" stroke="#dbe3ee"/>
    <text x="652" y="232" font-size="22" font-weight="700" fill="#0f172a">再执行</text>
    <text x="644" y="262" font-size="16" fill="#64748b">让 Codex 按边界处理</text>
    <line x1="800" y1="240" x2="866" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="880" y="190" width="230" height="100" rx="20" fill="#ffffff" stroke="#dbe3ee"/>
    <text x="934" y="232" font-size="22" font-weight="700" fill="#0f172a">后验收</text>
    <text x="918" y="262" font-size="16" fill="#64748b">检查结果是否符合需求</text>
    <rect x="250" y="360" width="700" height="54" rx="27" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="338" y="394" font-size="20" font-weight="700" fill="#075985">适合多文件、重构、Bug 修复、边界严格和高风险任务</text>
  </g>
</svg>
