<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-labelledby="title desc">
  <title id="title">CodeDNA visibility in Codex App</title>
  <desc id="desc">CodeDNA appears as Skills and an MCP server inside Codex App.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0f9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1280" height="620" rx="34" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="86" y="88" font-size="38" font-weight="800" fill="#0f172a">安装成功后在哪里看 CodeDNA</text>
    <text x="86" y="128" font-size="20" fill="#475569">CodeDNA 是工具型插件，通常显示为 Skills + MCP server，而不是普通 App 插件。</text>
    <g filter="url(#shadow)">
      <rect x="105" y="190" width="500" height="320" rx="28" fill="#ffffff" stroke="#dbeafe"/>
      <text x="150" y="248" font-size="28" font-weight="800" fill="#0f172a">Skills</text>
      <text x="150" y="286" font-size="18" fill="#64748b">搜索 codedna，可以看到多个工作流技能。</text>
      <rect x="150" y="330" width="360" height="50" rx="14" fill="#f1f5f9"/>
      <text x="176" y="362" font-size="18" fill="#0f172a">CodeDNA Orchestrator</text>
      <rect x="150" y="394" width="360" height="50" rx="14" fill="#f1f5f9"/>
      <text x="176" y="426" font-size="18" fill="#0f172a">CodeDNA Code Review</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="675" y="190" width="500" height="320" rx="28" fill="#ffffff" stroke="#bbf7d0"/>
      <text x="720" y="248" font-size="28" font-weight="800" fill="#0f172a">MCP Servers</text>
      <text x="720" y="286" font-size="18" fill="#64748b">设置页里应该看到 Codedna 或 codedna_local。</text>
      <rect x="720" y="330" width="360" height="62" rx="16" fill="#f0fdf4" stroke="#86efac"/>
      <text x="746" y="369" font-size="20" font-weight="700" fill="#14532d">Codedna</text>
      <circle cx="1045" cy="361" r="18" fill="#22c55e"/>
      <text x="1036" y="368" font-size="20" font-weight="800" fill="#ffffff">✓</text>
      <rect x="720" y="408" width="360" height="62" rx="16" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="746" y="447" font-size="20" font-weight="700" fill="#334155">codedna_local</text>
      <text x="908" y="447" font-size="16" fill="#64748b">兜底配置</text>
    </g>
  </g>
</svg>
