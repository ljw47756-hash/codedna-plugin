<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-labelledby="title desc">
  <title id="title">CodeDNA install settings</title>
  <desc id="desc">Recommended fields for adding the CodeDNA plugin marketplace in Codex App.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0fdfa"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="1280" height="560" rx="34" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="90" y="92" font-size="38" font-weight="800" fill="#0f172a">在 Codex App 中添加 CodeDNA</text>
    <text x="90" y="132" font-size="20" fill="#475569">添加插件市场时只需要填写仓库地址、分支，稀疏路径保持留空。</text>
    <g filter="url(#shadow)">
      <rect x="140" y="190" width="1000" height="260" rx="26" fill="#ffffff" stroke="#dbeafe"/>
      <text x="190" y="250" font-size="20" font-weight="700" fill="#334155">来源</text>
      <rect x="300" y="220" width="760" height="48" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="326" y="252" font-size="18" fill="#0f172a">https://github.com/ljw47756-hash/codedna-plugin.git</text>
      <text x="190" y="320" font-size="20" font-weight="700" fill="#334155">Git 引用</text>
      <rect x="300" y="290" width="760" height="48" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="326" y="322" font-size="18" fill="#0f172a">main</text>
      <text x="190" y="390" font-size="20" font-weight="700" fill="#334155">稀疏路径</text>
      <rect x="300" y="360" width="760" height="48" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
      <text x="326" y="392" font-size="18" fill="#64748b">留空</text>
    </g>
  </g>
</svg>
