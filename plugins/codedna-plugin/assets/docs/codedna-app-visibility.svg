<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">CodeDNA in Codex App</title>
  <desc id="desc">A diagram explaining that CodeDNA appears as skills and an MCP server in Codex App.</desc>
  <rect width="1100" height="520" rx="28" fill="#f8fafc"/>
  <text x="70" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">CodeDNA 在 Codex App 中的显示方式</text>
  <text x="70" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#64748b">CodeDNA 是 MCP + Skills 工具型插件，不是外部 App 连接器</text>
  <rect x="70" y="166" width="300" height="250" rx="22" fill="#ffffff" stroke="#dbe3ee"/>
  <circle cx="112" cy="214" r="20" fill="#38bdf8"/>
  <text x="146" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Skills</text>
  <text x="96" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">CodeDNA 相关技能</text>
  <text x="96" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#64748b">负责识别任务场景并引导 Codex 工作</text>
  <rect x="400" y="166" width="300" height="250" rx="22" fill="#ffffff" stroke="#dbe3ee"/>
  <circle cx="442" cy="214" r="20" fill="#22c55e"/>
  <text x="476" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">MCP</text>
  <text x="426" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Codedna 本地工具服务器</text>
  <text x="426" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#64748b">提供本地工具能力</text>
  <rect x="730" y="166" width="300" height="250" rx="22" fill="#ffffff" stroke="#dbe3ee"/>
  <circle cx="772" cy="214" r="20" fill="#f97316"/>
  <text x="806" y="222" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Apps</text>
  <text x="756" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">不提供外部 App 连接器</text>
  <text x="756" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#64748b">所以可能不会显示为顶层应用卡片</text>
  <rect x="218" y="440" width="664" height="48" rx="24" fill="#e0f2fe" stroke="#7dd3fc"/>
  <text x="296" y="471" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#075985">安装成功标志：Skills 可见，MCP 中 Codedna 已启用</text>
</svg>
